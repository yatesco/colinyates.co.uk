[settings]
idiomatic_version_file_enable_tools = ["node", "npm"]

[env]
_.file = { path = "{{config_root}}/.env.json", redact = true }
_.path = ["{{config_root}}/node_modules/.bin"]
# Use the project name derived from the current directory
PROJECT_NAME = "{{ config_root | basename }}"
# Set up the path for node module binaries
BIN_PATH = "{{ config_root }}/node_modules/.bin"

[tools]
# for security stuff
age = "1.2.0"
sops = "3.12.1"
# for the project itself
node = "24.14.0"
npm = "11.11.0"
python = "3.14.3"

[tasks]
[tasks.libs]
description = "Install development libraries"
run = "npm install"

[tasks.dev]
description = "Start development server"
run = "npm run dev"

[tasks.prod]
description = "Build and deploy the site to cloudflare"
alias = "dist"
depends = ["prod:build", "prod:deploy"]

[tasks."prod:build"]
description = "Build production"
run = "npm run build"

[tasks."prod:launch"]
description = "Launch production web server"
run = "cd dist && python -m http.server 8000"

[tasks."prod:deploy"]
description = "Deploy the website to cloudflare (PROD)"
run = "wrangler deploy --env=production"

[tasks."staging:deploy"]
description = "Deploy the website to cloudflare (STAGING)"
run = "wrangler deploy --env=staging"

[tasks."security:decrypt"]
description = "Decrypt the files (only for dev!)"
run = "sops decrypt -i {{config_root}}/.env.json"

[tasks."security:encrypt"]
description = "Encrypt the files"
run = "sops encrypt -i {{config_root}}/.env.json"

[tasks."playwright:snapshots"]
description = "Generate Playwright regression snapshots in CI Docker image (Linux)"
run = "docker run --rm -v $PWD:/workspace -w /workspace mcr.microsoft.com/playwright:v1.58.2-noble bash -c 'npm ci && npm run build && nohup npm run serve ./dist > /dev/null 2>&1 & SERVER_PID=$! && npm run wait-on http://localhost:3000 && npm run test:e2e -- --update-snapshots; kill $SERVER_PID'"

[tasks."playwright:test:e2e"]
description = "Run Playwright tests in Linux Docker for consistent snapshot filenames"
run = "docker run --rm -v $PWD:/workspace -w /workspace mcr.microsoft.com/playwright:v1.58.2-noble bash -c 'npm ci && npm run build && nohup npm run serve ./dist > /dev/null 2>&1 & SERVER_PID=$! && npm run wait-on http://localhost:3000 && npx playwright test; kill $SERVER_PID'"
