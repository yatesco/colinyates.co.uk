name: Main CI
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
jobs:
  build_dist:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Build Astro site
        run: npm run build
      - name: Archive dist
        run: tar -czf dist.tar.gz dist/
      - name: Upload dist artifact
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist.tar.gz
          retention-days: 1

  playwright:
    needs: build_dist
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Download dist artifact
        uses: actions/download-artifact@v3
        with:
          name: dist
      - name: Extract dist
        run: tar -xzf dist.tar.gz
      - name: List dist files
        run: ls -l ./dist
      - name: Add untested blog pages
        run: npm run add-untested-pages
      - name: Run Playwright tests
        run: npm run test:e2e
      - name: Archive Playwright report
        if: always()
        run: tar -czf playwright-report.tar.gz playwright-report/
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report.tar.gz
          retention-days: 1
      - name: Archive Playwright test results
        if: always()
        run: tar -czf test-results.tar.gz test-results/
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-results.tar.gz
          retention-days: 1

  deploy:
    needs: playwright
    runs-on: ubuntu-latest
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install sops
        run: |
          SOPS_VERSION="v3.12.1"
          curl -LO https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64
          sudo mv sops-${SOPS_VERSION}.linux.amd64 /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops
      - name: Decrypt secrets
        run: sops decrypt -i .env.json
      - name: Export and echo Cloudflare secrets
        run: |
          export CLOUDFLARE_API_TOKEN=$(jq -r '.CLOUDFLARE_API_TOKEN' .env.json)
          export CLOUDFLARE_ACCOUNT_ID=$(jq -r '.CLOUDFLARE_ACCOUNT_ID' .env.json)
          echo "CLOUDFLARE_API_TOKEN: $CLOUDFLARE_API_TOKEN"
          echo "CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"
      - name: Install dependencies
        run: npm ci
      - name: Download dist artifact
        uses: actions/download-artifact@v3
        with:
          name: dist
      - name: Extract dist
        run: tar -xzf dist.tar.gz
      - name: Deploy to Cloudflare
        run: |
          export CLOUDFLARE_API_TOKEN=$(jq -r '.CLOUDFLARE_API_TOKEN' .env.json)
          export CLOUDFLARE_ACCOUNT_ID=$(jq -r '.CLOUDFLARE_ACCOUNT_ID' .env.json)
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            npm run prod:deploy
          else
            npm run staging:deploy
          fi
