name: Main CI
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
jobs:
  build_test_deploy:
    runs-on: ubuntu-latest
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      # === BUILD SEGMENT ===
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build CI Docker image
        run: docker build -t ci-image-${{ github.repository }}-${{ github.sha }} -f Dockerfile.ci .
      - name: Install dependencies
        uses: addnab/docker-run-action@v3
        with:
          image: ci-image-${{ github.repository }}-${{ github.sha }}
          options: -v ${{ github.workspace }}:/workspace
          run: |
            cd /workspace
            npm ci
      - name: Build Astro site
        uses: addnab/docker-run-action@v3
        with:
          image: ci-image-${{ github.repository }}-${{ github.sha }}
          options: -v ${{ github.workspace }}:/workspace
          run: |
            cd /workspace
            npm run build
      - name: Add untested blog pages and run Playwright tests
        uses: addnab/docker-run-action@v3
        with:
          image: ci-image-${{ github.repository }}-${{ github.sha }}
          options: -v ${{ github.workspace }}:/workspace
          run: |
            set -e
            cd /workspace
            npm run add-untested-pages
            npm run test:e2e
      - name: Decrypt secrets
        uses: addnab/docker-run-action@v3
        with:
          image: ci-image-${{ github.repository }}-${{ github.sha }}
          options: -v ${{ github.workspace }}:/workspace
          run: |
            cd /workspace
            sops decrypt -i .env.json
      - name: Deploy to Cloudflare
        uses: addnab/docker-run-action@v3
        with:
          image: ci-image-${{ github.repository }}-${{ github.sha }}
          options: -v ${{ github.workspace }}:/workspace
          run: |
            cd /workspace
            export CLOUDFLARE_API_TOKEN=$(jq -r '.CLOUDFLARE_API_TOKEN' .env.json)
            export CLOUDFLARE_ACCOUNT_ID=$(jq -r '.CLOUDFLARE_ACCOUNT_ID' .env.json)
            if [ "$GITHUB_REF_NAME" = "main" ]; then
              npx wrangler deploy --env=production
            else
              npx wrangler deploy --env=staging
            fi
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-results/
          retention-days: 1
