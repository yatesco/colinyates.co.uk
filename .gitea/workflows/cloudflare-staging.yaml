name: cloudflare (staging)

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main

jobs:
  staging:
    runs-on: ubuntu-latest
    env:
      MISE_SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3
        with:
          install: true # [default: true] run `mise install`
          cache: false # [default: true] cache mise using GitHub's cache
          experimental: true # [default: false] enable experimental features
          log_level: debug # [default: info] log level
          github_token: ${{ secrets.MY_GITHUB_TOKEN }}
      - name: Install dependencies
        run: mise run libs
      - name: Build
        run: mise run prod:build
      - name: Deploy
        run: mise run staging:deploy
